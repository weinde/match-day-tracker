<header class="d-flex justify-content-between align-items-center mb-4">
  <h1 class="mb-0">My Matches</h1>
  <a class="btn btn-primary" routerLink="/matches/new">+ New Match</a>
</header>

@if (matches().length > 0) {
  <section class="mb-4">
    <h2 class="h5 mb-3">Shots over time</h2>
    <app-match-chart [matches]="matches()" />
  </section>
}

@if (matches().length === 0) {
  <div class="alert alert-light text-center py-5">
    <p class="mb-3">No matches logged yet.</p>
    <a class="btn btn-primary" routerLink="/matches/new">Log your first match</a>
  </div>
} @else {
  <div class="list-group">
    @for (match of matches(); track match.id) {
      <app-match-card
        [match]="match"
        (delete)="onDelete($event)" />
    }
  </div>
}
