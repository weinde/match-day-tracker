<article class="list-group-item">
  <div class="d-flex justify-content-between align-items-start">
    <div>
      <h5 class="mb-1">{{ match().homeTeam }} vs {{ match().awayTeam }}</h5>
      <p class="mb-1 text-muted">
        {{ match().date }} · {{ match().venue }} · {{ match().weather }}
      </p>
      <small>{{ match().shotsCount }} shots taken</small>
    </div>
    <div class="btn-group btn-group-sm">
      <a class="btn btn-outline-secondary"
         [routerLink]="['/matches', match().id, 'edit']">
        Edit
      </a>
      <button class="btn btn-outline-danger"
              type="button"
              (click)="delete.emit(match())">
        Delete
      </button>
    </div>
  </div>
</article>
